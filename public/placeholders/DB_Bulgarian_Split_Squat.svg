<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120">
  <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
  <text x="160" y="60" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#0f172a" text-anchor="middle">Bulgarian Split Squat</text>
  <g transform="translate(160,80)">
    <rect x="-30" y="-8" width="60" height="16" fill="#2563eb" rx="4">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
